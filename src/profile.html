<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DIGITAL EXHAUST</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="icon" type="image/png" href="src\images\folder3.ico">

    <style>
        /* Styles Will Go Here Instead of a New CSS Page Just because */
        body { 
            background-color: #FFFFFF; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
        }
        
        #void-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }

        #network-map { 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%; 
            z-index: 1;
            pointer-events: none;
        }

        .data-square {
            position: absolute;
            width: 120px;
            height: 120px;
            background: white;
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            cursor: pointer;
            z-index: 5;
            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1), box-shadow 0.3s;
            animation: gentle-float 6s infinite ease-in-out;
            overflow: hidden;

        }

        .data-square:hover {
            animation: none !important; /* Stop the floating so the zoom can happen */
            transform: scale(1.5) !important;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(255, 0, 51, 0.2);
            border-color: #FF0033;
        }

        .square-label {
            font-size: 7px;
            font-weight: 900;
            color: #FF0033;
            margin-bottom: 5px;
            text-align: center;
        }

        .square-content {
            font-size: 9px;
            text-align: center;
            color: #000;
            text-transform: none;
            line-height: 1.2;
            pointer-events: none;
        }

        @keyframes gentle-float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .map-line {
            stroke: #FF0033;
            stroke-width: 1.5;
            opacity: 0.2;
            transition: opacity 0.3s, stroke-width 0.3s;
        }
        /* SET ARCHETYPE */
        


        .archetype-title {
            font-size: 2.2rem;
            font-weight: 900;
            color: #000;
            margin-bottom: 20px;
            line-height: 1;
        }

      
        .archetype-description {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.5;
            margin-bottom: 40px;
            text-transform: none;
            
        }
        /* THE BUTTONS */
        .btn-reveal-trigger, .btn-audit-reset {
            background: #000;
            color: #fff;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            padding: 15px 30px;
        }

        .btn-reveal-trigger:hover, .btn-audit-reset:hover {
            background: #FF0033;
            box-shadow: none;
            transform: translate(4px, 4px);
        }

        /* THE REVEAL OVERLAY (Placed in center of screen) */
        .reveal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #FFFFFF;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reveal-card {
            max-width: 550px;
            width: 85%;
            border: 3px solid #000;
            padding: 60px 40px;
            background: white;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .reveal-card::before {
            content: "Who are you?";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #FF0033;
            color: white;
            padding: 5px 15px;
            font-size: 10px;
            font-weight: 900;
        }
        
        


    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    <main id="void-container">
        <svg id="network-map" xmlns="http://www.w3.org/2000/svg"></svg>
    </main>
    <script src="profile.js"></script>
</body>
</html>
